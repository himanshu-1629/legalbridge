
<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - LegalBridge</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    .card { background:#1c1c1c; padding:15px; margin-bottom:15px; border-radius:10px; }
    button { padding:6px 10px; margin-right:10px; cursor:pointer; }
  </style>
</head>
<body>

<h2>Admin Panel - Lawyer Verification</h2>
<div id="lawyerList"></div>

<script>

async function loadLawyers() {

  const response = await fetch("/api/lawyer/all");
  const lawyers = await response.json();

  const container = document.getElementById("lawyerList");
  container.innerHTML = "";

  lawyers.forEach(lawyer => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${lawyer.firstName} ${lawyer.lastName}</h3>
      <p>Email: ${lawyer.email}</p>
      <p>Status: <b>${lawyer.verificationStatus}</b></p>
      <button onclick="approve('${lawyer._id}')">Approve</button>
      <button onclick="reject('${lawyer._id}')">Reject</button>
      <hr>
    `;

    container.appendChild(div);
  });
}

async function approve(id) {

  await fetch(`/api/lawyer/approve/${id}`, {
    method: "PUT"
  });

  alert("Lawyer Approved");
  loadLawyers();
}

async function reject(id) {

  await fetch(`/api/lawyer/reject/${id}`, {
    method: "PUT"
  });

  alert("Lawyer Rejected");
  loadLawyers();
}

loadLawyers();

</script>

</body>
</html>
